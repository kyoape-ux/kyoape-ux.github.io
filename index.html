<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>光田醫院 多媒體組 工具站</title>
<style>
  :root { --g:#0F6E56; --g-light:#E1F5EE; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Noto Sans TC',system-ui,-apple-system,sans-serif; background:#F4F5F2; min-height:100vh; padding:40px 20px; }
  .wrap { max-width:900px; margin:0 auto; }
  .hdr { text-align:center; margin-bottom:44px; }
  .hdr-icon { font-size:44px; margin-bottom:14px; }
  .hdr h1 { font-size:24px; color:#1A1A18; margin-bottom:6px; font-weight:700; letter-spacing:.5px; }
  .hdr p  { font-size:14px; color:#999; }
  .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:16px; }
  .tool-card {
    background:#fff; border:1px solid #E2E2DC; border-radius:14px; padding:26px;
    text-decoration:none; color:#1A1A18; transition:.18s ease;
    display:flex; flex-direction:column; gap:6px;
  }
  .tool-card:hover { border-color:var(--g); transform:translateY(-3px); box-shadow:0 6px 20px rgba(0,0,0,0.07); }
  .tool-icon { font-size:34px; margin-bottom:8px; }
  .tool-name { font-size:16px; font-weight:600; }
  .tool-desc { font-size:13px; color:#888; line-height:1.7; }
  .badge { display:inline-block; background:var(--g-light); color:var(--g); font-size:11px; padding:2px 10px; border-radius:10px; margin-top:8px; width:fit-content; }
  .footer { text-align:center; font-size:12px; color:#bbb; margin-top:48px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="hdr-icon">🏥</div>
    <h1>光田醫院 多媒體組 工具站</h1>
    <p>行銷暨多媒體製作團隊 · 內部工具</p>
  </div>
  <div class="grid">
    <a href="./files/視覺多媒體設計組_專案管理_v3.html" class="tool-card">
      <div class="tool-icon">📋</div>
      <div class="tool-name">工作進度控管</div>
      <div class="tool-desc">美編組 &amp; 多媒體組專案進度、甘特圖、週報產生器</div>
      <div class="badge">v3 Sheets 版</div>
    </a>
    <a href="./youtube-manager.html" class="tool-card">
      <div class="tool-icon">▶️</div>
      <div class="tool-name">影片發布資訊管理</div>
      <div class="tool-desc">YouTube / Facebook / Instagram 跨平台影片成效追蹤、績效達標管理</div>
      <div class="badge">Sheets 後端</div>
    </a>
    <a href="./media-toolkit.html" class="tool-card">
      <div class="tool-icon">🎬</div>
      <div class="tool-name">影音小助手</div>
      <div class="tool-desc">影音格式轉換、剪輯輔助工具</div>
      <div class="badge">本機工具</div>
    </a>
  </div>
  <p class="footer">光田綜合醫院 · 視覺多媒體設計組內部使用</p>
</div>
</body>
</html>
